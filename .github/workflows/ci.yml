name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: police-data-proj
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            police-data-proj
            source

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src/

      - name: Run pipeline
        run: uv run python main.py
